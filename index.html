  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e-height:1.85;color:var(--mut)}\n.tree .f{color:var(--teal)}\n.tree .cm{color:var(--faint)}\n\n/* status legend pills */\n.legend{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}\n.pill{font-size:11.5px;font-weight:600;padding:4px 11px 4px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:7px}\n.pill .dot{width:8px;height:8px;border-radius:50%;background:currentColor}\n.pill.up{color:var(--up);background:color-mix(in srgb,var(--up) 13%,transparent)}\n.pill.warn{color:var(--warn);background:color-mix(in srgb,var(--warn) 13%,transparent)}\n.pill.down{color:var(--down);background:color-mix(in srgb,var(--down) 15%,transparent)}\n.pill.paused{color:var(--paused);background:color-mix(in srgb,var(--paused) 14%,transparent)}\n.pill.ack{color:var(--ack);background:color-mix(in srgb,var(--ack) 14%,transparent)}\n\nfooter{position:relative;z-index:1;border-top:1px solid var(--hair);padding:30px 28px;text-align:center;\n  font-size:12px;color:var(--faint);font-family:var(--mono);max-width:1200px;margin:0 auto}\n\n@media(max-width:980px){\n  .wrap{grid-template-columns:1fr;gap:0}\n  nav.toc{position:fixed;top:60px;left:0;width:264px;height:calc(100vh - 60px);background:var(--bg);\n    border-right:1px solid var(--line);padding:24px 16px;z-index:40;transform:translateX(-100%);transition:.2s;box-shadow:var(--shadow)}\n  nav.toc.open{transform:none}\n  .menu-btn{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;\n    background:var(--raise);border:1px solid var(--line);color:var(--tx);font-size:17px;cursor:pointer}\n  .top .links{display:none}\n  .herorow{grid-template-columns:1fr}\n  .device{max-width:380px}\n  .hero h1{font-size:36px}\n  .fgrid,.ckgrid{grid-template-columns:1fr}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<header class=\"top\">\n  <button class=\"menu-btn\" id=\"menuBtn\" aria-label=\"Menu\">≡<\u002Fbutton>\n  <div class=\"brand\">\n    <div class=\"mk\">H<\u002Fdiv>\n    <div class=\"nm\">Host Monitor<small>v1.4.18 · ESP32-S3 firmware<\u002Fsmall><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"links\">\n    <a href=\"#install\">Install<\u002Fa>\n    <a href=\"#firstrun\">First run<\u002Fa>\n    <a href=\"#transport\">Transport<\u002Fa>\n    <a href=\"#api\">API<\u002Fa>\n    <a class=\"ghbtn\" href=\"#source\">◆ Source layout<\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"wrap\">\n  <nav class=\"toc\" id=\"toc\">\n    <div class=\"grp\">Get started<\u002Fdiv>\n    <a href=\"#overview\"><span class=\"n\">00<\u002Fspan>Overview<\u002Fa>\n    <a href=\"#hardware\"><span class=\"n\">01<\u002Fspan>Hardware<\u002Fa>\n    <div class=\"grp\">Setup<\u002Fdiv>\n    <a href=\"#install\"><span class=\"n\">02<\u002Fspan>Installation<\u002Fa>\n    <a href=\"#dashboard\"><span class=\"n\">03<\u002Fspan>Dashboard assets<\u002Fa>\n    <a href=\"#firstrun\"><span class=\"n\">04<\u002Fspan>First run<\u002Fa>\n    <a href=\"#security\"><span class=\"n\">05<\u002Fspan>Security<\u002Fa>\n    <div class=\"grp\">Reference<\u002Fdiv>\n    <a href=\"#hosts\"><span class=\"n\">06<\u002Fspan>hosts.csv format<\u002Fa>\n    <a href=\"#checks\"><span class=\"n\">07<\u002Fspan>The six checks<\u002Fa>\n    <a href=\"#api\"><span class=\"n\">08<\u002Fspan>Web / JSON API<\u002Fa>\n    <a href=\"#source\"><span class=\"n\">09<\u002Fspan>Source layout<\u002Fa>\n    <a href=\"#limits\"><span class=\"n\">10<\u002Fspan>Limitations<\u002Fa>\n  <\u002Fnav>\n\n  <main>\n    <!-- HERO -->\n    <div class=\"hero\">\n      <div class=\"herorow\">\n        <div>\n          <div class=\"eyebrow\">Self-hosted network monitoring appliance<\u002Fdiv>\n          <h1>Host Monitor<\u002Fh1>\n          <p class=\"lead\">A monitoring appliance for the Waveshare ESP32-S3-Touch-LCD-4.3. It watches a fleet of hosts with six pluggable checks, shows health on the on-device LCD, and serves a web dashboard embedded in the firmware — over plain HTTP behind Basic Auth — with webhook alerting and pause / acknowledge governance.<\u002Fp>\n          <div class=\"chips\">\n            <span class=\"hchip\"><span class=\"dot\"><\u002Fspan>800×480 RGB touch panel<\u002Fspan>\n            <span class=\"hchip\"><span class=\"dot\"><\u002Fspan>6 checks per host<\u002Fspan>\n            <span class=\"hchip\"><span class=\"dot\"><\u002Fspan>HTTP + Basic Auth<\u002Fspan>\n            <span class=\"hchip\"><span class=\"dot\"><\u002Fspan>Webhook alerts<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div class=\"device\">\n            <div class=\"screen\">\n              <div class=\"scr-top\"><span class=\"d\"><\u002Fspan><b>Fleet Health<\u002Fb><span class=\"t\">14:52 · hostmon-01<\u002Fspan><\u002Fdiv>\n              <div class=\"scr-body\">\n                <div class=\"donut\"><div class=\"ctr\"><b>14<\u002Fb><span>hosts<\u002Fspan><\u002Fdiv><\u002Fdiv>\n                <div class=\"scr-stats\">\n                  <div class=\"sstat\"><span class=\"sw\" style=\"background:var(--up)\"><\u002Fspan><span class=\"lb\">Up<\u002Fspan><span class=\"vv c-up\" style=\"color:var(--up)\">11<\u002Fspan><\u002Fdiv>\n                  <div class=\"sstat\"><span class=\"sw\" style=\"background:var(--warn)\"><\u002Fspan><span class=\"lb\">Warn<\u002Fspan><span class=\"vv\" style=\"color:var(--warn)\">1<\u002Fspan><\u002Fdiv>\n                  <div class=\"sstat\"><span class=\"sw\" style=\"background:var(--down)\"><\u002Fspan><span class=\"lb\">Down<\u002Fspan><span class=\"vv\" style=\"color:var(--down)\">1<\u002Fspan><\u002Fdiv>\n                  <div class=\"sstat\"><span class=\"sw\" style=\"background:var(--paused)\"><\u002Fspan><span class=\"lb\">Paused<\u002Fspan><span class=\"vv\" style=\"color:var(--paused)\">1<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"scr-nav\"><div class=\"on\">◴ Home<\u002Fdiv><div>▦ Hosts<\u002Fdiv><div>≡ Alerts · Setup<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"devtag\">on-device LCD · Home screen<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- OVERVIEW -->\n    <section id=\"overview\">\n      <h2><span class=\"num\">00<\u002Fspan>Overview<\u002Fh2>\n      <div class=\"htitle\">What it is<\u002Fdiv>\n      <p>Host Monitor is an <strong>Arduino IDE<\u002Fstrong> project that turns a Waveshare ESP32-S3 touch display into a standalone uptime monitor. It loads a host list from <code class=\"inl\">hosts.csv<\u002Fcode> in on-board flash (LittleFS), runs six checks against each host on independent schedules, and reports fleet status three ways: on the LCD, over an embedded web dashboard, and through alert delivery.<\u002Fp>\n      <div class=\"fgrid\">\n        <div class=\"fcard\"><div class=\"ic\">◴<\u002Fdiv><h4>On-device LCD<\u002Fh4><p>800×480 capacitive touch home screens — a health donut, a host grid, and an Alerts·Setup card, on a 3-tab nav with live refresh.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">⌘<\u002Fdiv><h4>Embedded dashboard<\u002Fh4><p>The full web UI + JSON REST API are compiled into the firmware (gzip) and served over <strong>plain HTTP<\u002Fstrong>, gated by Basic Auth.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">◎<\u002Fdiv><h4>Six checks<\u002Fh4><p>Ping, DNS, Port, HTTP, SSL and Trace — each with its own interval and per-host enable. SSL reads cert-expiry; HTTP has a per-host HTTP/HTTPS scheme.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">✉<\u002Fdiv><h4>Alerting<\u002Fh4><p>Webhook delivery (JSON POST/PUT) routed per host on down / warn / recovered, with re-notify. SMTP email was removed — route a webhook to a relay.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">⏸<\u002Fdiv><h4>Governance<\u002Fh4><p>Pause and acknowledge with a required reason — kept on the host and surfaced in the UI.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">◷<\u002Fdiv><h4>Timekeeping<\u002Fh4><p>Time comes from <strong>NTP<\u002Fstrong>, falling back to a runtime/uptime clock. (The on-board PCF85063 RTC is unused in this build — see Hardware.)<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"legend\">\n        <span class=\"pill up\"><span class=\"dot\"><\u002Fspan>Up<\u002Fspan>\n        <span class=\"pill warn\"><span class=\"dot\"><\u002Fspan>Warn<\u002Fspan>\n        <span class=\"pill down\"><span class=\"dot\"><\u002Fspan>Down<\u002Fspan>\n        <span class=\"pill paused\"><span class=\"dot\"><\u002Fspan>Paused<\u002Fspan>\n        <span class=\"pill ack\"><span class=\"dot\"><\u002Fspan>Acknowledged<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- HARDWARE -->\n    <section id=\"hardware\">\n      <h2><span class=\"num\">01<\u002Fspan>Hardware<\u002Fh2>\n      <div class=\"htitle\">What you need<\u002Fdiv>\n      <ul class=\"clean\">\n        <li><strong>Waveshare ESP32-S3-Touch-LCD-4.3<\u002Fstrong> — ESP32-S3, 8 MB OPI PSRAM, 8 MB flash (some revisions ship 16 MB — match Flash Size + partitions to your chip)<\u002Fli>\n        <li><strong>No microSD card and no RTC battery needed<\u002Fstrong> — the host list and dashboard both live in on-board flash<\u002Fli>\n      <\u002Ful>\n      <div class=\"note teal\"><span class=\"ic\">!<\u002Fspan><div>The 4.3\" panel is <b>parallel RGB (ST7262 / EK9716), not SPI<\u002Fb>. Two things must happen before any pixels render: the <b>CH422G I/O expander<\u002Fb> (I²C @ 0x20) must be initialised first (it drives LCD reset, backlight and GT911 touch reset), and <b>OPI 8 MB PSRAM must be enabled<\u002Fb> or the 768 KB RGB framebuffer won't allocate.<\u002Fdiv><\u002Fdiv>\n      <div class=\"note warn\"><span class=\"ic\">!<\u002Fspan><div><b>This firmware is <code class=\"inl\">Wire<\u002Fcode>-free — so the on-board PCF85063 RTC is unused.<\u002Fb> The GT911 touch + CH422G expander run on the panel library's <i>legacy<\u002Fi> IDF I²C driver; Arduino's <code class=\"inl\">Wire<\u002Fcode> pulls in the <i>new<\u002Fi> <code class=\"inl\">driver_ng<\u002Fcode>, and linking both aborts at boot (<span class=\"mono\">check_i2c_driver_conflict<\u002Fspan>). The RTC shares that bus, so it stays disabled; time comes from <b>NTP<\u002Fb> with a runtime/uptime fallback.<\u002Fdiv><\u002Fdiv>\n      <p>The board library owns the I2C bus and brings up the expander → RGB bus → GT911 touch automatically once you select the Waveshare board in its config (covered in <a href=\"#install\">Installation<\u002Fa>).<\u002Fp>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- INSTALL -->\n    <section id=\"install\">\n      <h2><span class=\"num\">02<\u002Fspan>Installation<\u002Fh2>\n      <div class=\"htitle\">Build environment<\u002Fdiv>\n      <p>This is an Arduino IDE project. Set up the board package, libraries, and Tools-menu settings in order.<\u002Fp>\n\n      <ol class=\"steps\">\n        <li>\n          <h4>Install the ESP32 board package (pinned)<\u002Fh4>\n          <p>Add the boards-manager URL, then install <strong>esp32 by Espressif → version 3.3.8<\u002Fstrong> — the version this code is built against (it relies on the IDF v5 / core 3.x APIs).<\u002Fp>\n          <div class=\"code\"><div class=\"bar\"><span class=\"fn\">Preferences → Additional boards manager URLs<\u002Fspan><button class=\"copy\">Copy<\u002Fbutton><\u002Fdiv><pre>https://espressif.github.io/arduino-esp32/package_esp32_index.json<\u002Fpre><\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <h4>Install libraries<\u002Fh4>\n          <p>From Library Manager unless noted. Versions matter — LVGL v9 and on-board TLS won't work against this code.<\u002Fp>\n          <div class=\"tbl\"><table>\n            <thead><tr><th>Library<\u002Fth><th>Version<\u002Fth><th>Notes<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr><td>lvgl<\u002Ftd><td class=\"mono\">8.4.x<\u002Ftd><td>Graphics engine. v9 will not compile.<\u002Ftd><\u002Ftr>\n              <tr><td>ESP32_Display_Panel<\u002Ftd><td class=\"mono\">1.0.4<\u002Ftd><td>Drives the CH422G expander + RGB bus + GT911 touch.<\u002Ftd><\u002Ftr>\n              <tr><td>ESP32_IO_Expander<\u002Ftd><td class=\"mono\">1.1.1<\u002Ftd><td>Dependency of ESP32_Display_Panel.<\u002Ftd><\u002Ftr>\n              <tr><td>esp-lib-utils<\u002Ftd><td class=\"mono\">0.3.0<\u002Ftd><td>Dependency of the panel stack.<\u002Ftd><\u002Ftr>\n              <tr><td>ESP32_IDF5_HTTPS_Server<\u002Ftd><td class=\"mono\">1.1.1<\u002Ftd><td>Used for its <strong>HTTP<\u002Fstrong> server + Basic Auth only (IDF5 fork of fhessel's server). Its TLS classes are not used — on-device HTTPS isn't viable here.<\u002Ftd><\u002Ftr>\n              <tr><td>ArduinoJson<\u002Ftd><td class=\"mono\">7.4.x<\u002Ftd><td>JSON API (code still uses the <code class=\"inl\">DynamicJsonDocument<\u002Fcode> alias).<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable><\u002Fdiv>\n          <p><code class=\"inl\">LittleFS<\u002Fcode>, <code class=\"inl\">WiFi<\u002Fcode>, <code class=\"inl\">HTTPClient<\u002Fcode>, <code class=\"inl\">WiFiClientSecure<\u002Fcode>, <code class=\"inl\">ESPmDNS<\u002Fcode>, <code class=\"inl\">Preferences<\u002Fcode>, the esp_ping/lwIP stack and mbedTLS ship with the ESP32 core. (mbedTLS is pulled in by <code class=\"inl\">WiFiClientSecure<\u002Fcode> for the SSL check, HTTPS host checks and webhooks — all unverified.)<\u002Fp>\n          <div class=\"note\"><span class=\"ic\">i<\u002Fspan><div><b>ESP Mail Client is no longer required.<\u002Fb> SMTP / email alerting was removed (its TLS footprint exceeded this board's free internal RAM) — webhook is the only delivery channel now, so you can uninstall it.<\u002Fdiv><\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <h4>Place lv_conf.h<\u002Fh4>\n          <p>Copy <code class=\"inl\">lv_conf.h<\u002Fcode> from the sketch folder into your Arduino <code class=\"inl\">libraries/<\u002Fcode> folder — it must sit <strong>next to<\u002Fstrong> the <code class=\"inl\">lvgl<\u002Fcode> folder. This build sets <code class=\"inl\">LV_MEM_CUSTOM=1<\u002Fcode> and allocates the LVGL pool in <strong>PSRAM<\u002Fstrong>, which frees internal RAM for Wi-Fi and the checks — don't skip it.<\u002Fp>\n          <div class=\"code\"><div class=\"bar\"><span class=\"fn\">~/Arduino/libraries/lv_conf.h<\u002Fspan><button class=\"copy\">Copy<\u002Fbutton><\u002Fdiv><pre>…/Arduino/libraries/lv_conf.h   <span class=\"c\"># next to the lvgl/ folder<\u002Fspan><\u002Fpre><\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <h4>Select the Waveshare board in ESP32_Display_Panel<\u002Fh4>\n          <p>This is the single most important step. Place a file named <code class=\"inl\">esp_panel_board_supported_conf.h<\u002Fcode> at your Arduino <code class=\"inl\">libraries/<\u002Fcode> <strong>root<\u002Fstrong> (next to <code class=\"inl\">lv_conf.h<\u002Fcode>) — the library finds it via <code class=\"inl\">__has_include(\"../../../…\")<\u002Fcode>, so it must live there, <strong>not<\u002Fstrong> inside the library folder. Without the board selected, <code class=\"inl\">Board::init()<\u002Fcode> fails and the screen stays black (backlight on).<\u002Fp>\n          <div class=\"code\"><div class=\"bar\"><span class=\"fn\">~/Arduino/libraries/esp_panel_board_supported_conf.h<\u002Fspan><button class=\"copy\">Copy<\u002Fbutton><\u002Fdiv><pre><span class=\"k\">#define<\u002Fspan> ESP_PANEL_BOARD_DEFAULT_USE_SUPPORTED   <span class=\"v\">(1)<\u002Fspan>\n<span class=\"k\">#define<\u002Fspan> BOARD_WAVESHARE_ESP32_S3_TOUCH_LCD_4_3<\u002Fpre><\u002Fdiv>\n        <\u002Fli>\n        <li>\n          <h4>Arduino IDE board settings (Tools menu)<\u002Fh4>\n          <p>PSRAM <strong>must<\u002Fstrong> be OPI PSRAM. The app build is large (LVGL + HTTP server + mbedTLS + ESP Mail Client + Display Panel), so use the bundled custom partition table — a default scheme won't fit.<\u002Fp>\n          <div class=\"tbl\"><table><tbody>\n            <tr><td>Board<\u002Ftd><td>ESP32S3 Dev Module<\u002Ftd><\u002Ftr>\n            <tr><td>PSRAM<\u002Ftd><td><span class=\"mono\">OPI PSRAM<\u002Fspan> — mandatory<\u002Ftd><\u002Ftr>\n            <tr><td>Flash Size<\u002Ftd><td>8MB (64Mb) — or 16MB if your board has it<\u002Ftd><\u002Ftr>\n            <tr><td>Partition Scheme<\u002Ftd><td><span class=\"mono\">Custom<\u002Fspan> → bundled <code class=\"inl\">partitions.csv<\u002Fcode> (5 MB app / ~2.9 MB LittleFS / coredump)<\u002Ftd><\u002Ftr>\n            <tr><td>Upload Speed<\u002Ftd><td><span class=\"mono\">921600<\u002Fspan><\u002Ftd><\u002Ftr>\n            <tr><td>USB CDC On Boot<\u002Ftd><td>Enabled (serial log; unreliable once RGB + Wi-Fi are live — the LCD surfaces diagnostics)<\u002Ftd><\u002Ftr>\n          <\u002Ftbody><\u002Ftable><\u002Fdiv>\n        <\u002Fli>\n      <\u002Fol>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- DASHBOARD ASSETS -->\n    <section id=\"dashboard\">\n      <h2><span class=\"num\">03<\u002Fspan>Dashboard assets<\u002Fh2>\n      <div class=\"htitle\">The web UI is embedded in the firmware<\u002Fdiv>\n      <div class=\"shot\">\n        <div class=\"chrome\"><span class=\"dots\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><span class=\"url\">http://monitor.local<\u002Fspan><\u002Fdiv>\n        <img src=\"fdaa3eaa-28c2-4b71-8f65-e90d6706f71f\" alt=\"Host Monitor web dashboard — fleet overview with uptime, status counts, host list, health donut, and fleet-uptime strip\" loading=\"lazy\">\n      <\u002Fdiv>\n      <div class=\"shotcap\">embedded web dashboard · Dashboard view (served over plain HTTP behind Basic Auth)<\u002Fdiv>\n      <p>There is <strong>no separate filesystem upload<\u002Fstrong>. The <code class=\"inl\">data/<\u002Fcode> folder (HTML / CSS / JS + <code class=\"inl\">setup.html<\u002Fcode>) is gzip-compressed into <code class=\"inl\">web_assets.h<\u002Fcode> and compiled straight into the binary, then served by the API's default route. Flashing the sketch ships the dashboard with it.<\u002Fp>\n      <ol class=\"steps\">\n        <li><h4>Edit the dashboard (optional)<\u002Fh4><p>Change the files under <code class=\"inl\">data/<\u002Fcode>, then regenerate <code class=\"inl\">web_assets.h<\u002Fcode> from them so the embedded copy matches.<\u002Fp><\u002Fli>\n        <li><h4>Upload the sketch<\u002Fh4><p>Sketch → Upload. That's it — the dashboard travels inside the firmware image. No LittleFS data-upload tool required.<\u002Fp><\u002Fli>\n        <li><h4>(Optional) seed a host list<\u002Fh4><p>Fresh flash starts with no hosts — add them in the dashboard, or pre-seed by writing a <code class=\"inl\">hosts.csv<\u002Fcode> to LittleFS. Either way it's persisted to and reloaded from flash.<\u002Fp><\u002Fli>\n      <\u002Fol>\n      <div class=\"note teal\"><span class=\"ic\">!<\u002Fspan><div>LittleFS is still used — just not for the UI. It holds the persistent <code class=\"inl\">hosts.csv<\u002Fcode>, auto-created on first boot.<\u002Fdiv><\u002Fdiv>\n      <div class=\"note\"><span class=\"ic\">i<\u002Fspan><div>Changing a <b>header<\u002Fb> (<code class=\"inl\">config.h<\u002Fcode>, <code class=\"inl\">model.h<\u002Fcode>…) or <code class=\"inl\">web_assets.h<\u002Fcode> can leave a stale object in Arduino's build cache. If a change “doesn't take”, clear <code class=\"inl\">…/arduino/sketches/*<\u002Fcode> and rebuild — the Alerts·Setup card shows a <code class=\"inl\">built HH:MM:SS<\u002Fcode> marker so you can confirm the running binary is current.<\u002Fdiv><\u002Fdiv>\n      <div class=\"note warn\"><span class=\"ic\">!<\u002Fspan><div><b>First boot does a little one-time setup.<\u002Fb> On a fresh board the firmware formats LittleFS, creates an empty <code class=\"inl\">hosts.csv<\u002Fcode>, and generates a <b>random per-device web password<\u002Fb> (shown on the LCD Alerts·Setup card). There's no on-device TLS key generation — the dashboard is plain HTTP — so the screen comes up in seconds.<\u002Fdiv><\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- FIRST RUN -->\n    <section id=\"firstrun\">\n      <h2><span class=\"num\">04<\u002Fspan>First run<\u002Fh2>\n      <div class=\"htitle\">Two ways onto your network<\u002Fdiv>\n      <p>Get the device onto your Wi-Fi one of two ways. <strong>Method 1<\u002Fstrong> bakes the network name and password into the firmware for a fixed deployment; <strong>Method 2<\u002Fstrong> is the interactive AP wizard. Either way you finish at the same place — <a href=\"#openboard\">open the dashboard<\u002Fa>.<\u002Fp>\n\n      <h3>Method 1 — hardcode the Wi-Fi name &amp; password in config.h<\u002Fh3>\n      <p>For a fixed deployment, set the SSID and password in <code class=\"inl\">config.h<\u002Fcode> before flashing and skip the wizard entirely. If <code class=\"inl\">WIFI_SSID_BUILTIN<\u002Fcode> is non-empty the device <strong>joins that network on every boot<\u002Fstrong> and ignores saved / AP credentials.<\u002Fp>\n      <div class=\"code\"><div class=\"bar\"><span class=\"fn\">config.h<\u002Fspan><button class=\"copy\">Copy<\u002Fbutton><\u002Fdiv><pre><span class=\"k\">#define<\u002Fspan> WIFI_SSID_BUILTIN  <span class=\"s\">\"my-ssid\"<\u002Fspan>\n<span class=\"k\">#define<\u002Fspan> WIFI_PASS_BUILTIN  <span class=\"s\">\"my-pass\"<\u002Fspan>   <span class=\"c\">// leave both \"\" for the AP wizard<\u002Fspan><\u002Fpre><\u002Fdiv>\n      <div class=\"note warn\"><span class=\"ic\">!<\u002Fspan><div>Baked-in credentials are <b>readable from the firmware image<\u002Fb> — fine for a controlled deployment, but anyone with the binary can recover the PSK. Prefer this only on encrypted-flash builds.<\u002Fdiv><\u002Fdiv>\n\n      <h3>Method 2 — AP setup wizard<\u002Fh3>\n      <ol class=\"steps\">\n        <li><h4>Join the AP<\u002Fh4><p>With no saved Wi-Fi, the device raises an <strong>open access point named <code class=\"inl\">HostMon<\u002Fcode><\u002Fstrong>. Join it from a phone, then <strong>browse manually<\u002Fstrong> to <code class=\"inl\">http://192.168.4.1<\u002Fcode> — there's no captive-portal auto-popup, so open the address by hand.<\u002Fp><\u002Fli>\n        <li><h4>Choose a network<\u002Fh4><p>Pick your network and enter the password — the device saves them and <strong>reboots onto your LAN<\u002Fstrong>. There's no “stay an access point” mode; AP mode is only the no-credentials fallback.<\u002Fp><\u002Fli>\n      <\u002Fol>\n      <div class=\"note\"><span class=\"ic\">i<\u002Fspan><div><b>The AP is not captive.<\u002Fb> The captive-portal auto-redirect was dropped — its DNS hijack asserted under the lwIP core lock on this core. The AP itself works fine; just open <code class=\"inl\">http://192.168.4.1<\u002Fcode> manually after joining.<\u002Fdiv><\u002Fdiv>\n\n      <h3 id=\"openboard\">Open the dashboard<\u002Fh3>\n      <p>Once the device is on your LAN, browse to <strong>http://monitor.local/<\u002Fstrong> (or <code class=\"inl\">http://&lt;ip&gt;/<\u002Fcode>, shown on the LCD). It's HTTP only — read the auto-generated login off the screen (see below).<\u002Fp>\n\n      <h3 id=\"transport\">Transport &amp; TLS<\u002Fh3>\n      <p>The dashboard + API serve over <strong>plain HTTP only<\u002Fstrong>. <strong>On-device HTTPS was removed<\u002Fstrong> — it isn't viable on this board: an mbedTLS connection needs ~16–32&nbsp;KB of <em>contiguous internal<\u002Fem> RAM, which the device can't reliably spare alongside Wi-Fi + the check engine + the web server. With it enabled the TLS listener came up but handshakes reset (<code class=\"inl\">ERR_CONNECTION_RESET<\u002Fcode>) regardless of cert type, so the TLS server, cert provisioning, and embedded cert/key were all deleted.<\u002Fp>\n      <div class=\"note teal\"><span class=\"ic\">!<\u002Fspan><div><b>To get real TLS, terminate it in front of the device<\u002Fb> — a reverse proxy with a proper certificate (<b>Caddy<\u002Fb> automatic HTTPS, <b>nginx<\u002Fb>, or <b>Traefik<\u002Fb> on a Pi / NAS / router) listening on 443 and forwarding to <code class=\"inl\">http://&lt;device-ip&gt;/<\u002Fcode>. Or keep the device on a <b>trusted / isolated VLAN<\u002Fb> and accept plain HTTP there.<\u002Fdiv><\u002Fdiv>\n      <div class=\"note\"><span class=\"ic\">i<\u002Fspan><div><b>Outbound TLS now works — one insecure session at a time.<\u002Fb> After <code class=\"inl\">MAX_HOSTS<\u002Fcode> was reduced to reclaim internal RAM, a single mbedTLS session (~44&nbsp;KB peak) fits — confirmed by a boot-time self-test. The firmware uses it for the <a href=\"#checks\">SSL cert-expiry check<\u002Fa>, insecure HTTPS host checks, and the webhook notifier. A global gate (<code class=\"inl\">tls_gate.*<\u002Fcode>) serialises every outbound TLS site across the check and web tasks, so two sessions can never allocate at once. <b>Verified<\u002Fb> TLS (CA-bundle chain validation) still doesn't fit — that stays reverse-proxy territory.<\u002Fdiv><\u002Fdiv>\n      <div class=\"note warn\"><span class=\"ic\">!<\u002Fspan><div><b>Heap / crash guard before every TLS session.<\u002Fb> Because a single session can still tip the device into an out-of-memory fault under load, the gate now does a <b>free-RAM pre-check<\u002Fb> before it allocates. A session only starts if <b>both<\u002Fb> thresholds are met: <code class=\"inl\">TLS_MIN_FREE_BLOCK<\u002Fcode> (<b>20&nbsp;KB<\u002Fb> largest <i>contiguous<\u002Fi> internal block, for the ~16&nbsp;KB session buffers) <b>and<\u002Fb> <code class=\"inl\">TLS_MIN_FREE_TOTAL<\u002Fcode> (<b>48&nbsp;KB<\u002Fb> total free internal, for the ~44&nbsp;KB whole session). If either is below its floor the session is <b>skipped for that cycle<\u002Fb> and reported as <code class=\"inl\">low mem<\u002Fcode> — the check / webhook simply defers (re-notify retries later) instead of crashing. A distinct case: if a TLS site can't get the single-session slot within <b>~15&nbsp;s<\u002Fb> it reports <code class=\"inl\">tls busy<\u002Fcode> rather than <code class=\"inl\">low mem<\u002Fcode>. It's sized as <b>insurance<\u002Fb>: it only blocks a session that couldn't have fit anyway, so checks that currently succeed are unaffected. Watch the <b>RAM gauge<\u002Fb> on the LCD Alerts·Setup card (<code class=\"inl\">free · largest · min<\u002Fcode>) as you add hosts — if <code class=\"inl\">min<\u002Fcode> trends toward single digits, the guard is what keeps a depleted moment from faulting. Raise the floors (e.g. 54–60&nbsp;KB total) for a higher guaranteed margin, accepting that TLS checks defer sooner under pressure.<\u002Fdiv><\u002Fdiv>\n\n      <h3>Login — auto-generated password<\u002Fh3>\n      <p>On first boot the device generates a <strong>random per-device web password<\u002Fstrong> (12 chars, unambiguous alphabet) and shows it on the LCD Alerts·Setup card as <code class=\"inl\">Web login: admin / …<\u002Fcode>. There is <strong>no shared default password<\u002Fstrong> — read it off the screen to log in, then set your own in Settings (8–39 chars); the LCD line disappears once you do.<\u002Fp>\n      <div class=\"note warn\"><span class=\"ic\">!<\u002Fspan><div><b>Set your own password promptly.<\u002Fb> Because the dashboard is cleartext HTTP, the Basic-Auth credential traverses the network unencrypted on an untrusted segment — the reverse proxy or VLAN above is what protects it. Change it in Settings, or via <code class=\"inl\">POST /api/settings/auth<\u002Fcode>.<\u002Fdiv><\u002Fdiv>\n\n      <h3>Timekeeping<\u002Fh3>\n      <p>Time comes from <strong>NTP<\u002Fstrong> once the network is up. Offline, or before NTP completes, the device falls back to an <strong>uptime-based runtime clock<\u002Fstrong>. The active source is reported as <code class=\"inl\">device.time<\u002Fcode> (<span class=\"mono\">ntp / runtime<\u002Fspan>) in <code class=\"inl\">GET /api/summary<\u002Fcode>.<\u002Fp>\n      <div class=\"note\"><span class=\"ic\">i<\u002Fspan><div>The on-board PCF85063 RTC is <b>unused in this build<\u002Fb> — it shares the panel's legacy I²C bus, and this firmware stays <code class=\"inl\">Wire<\u002Fcode>-free to avoid an I²C driver conflict at boot (see <a href=\"#hardware\">Hardware<\u002Fa>). So time does not survive a power loss before NTP re-syncs.<\u002Fdiv><\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SECURITY -->\n    <section id=\"security\">\n      <h2><span class=\"num\">05<\u002Fspan>Security<\u002Fh2>\n      <div class=\"htitle\">A LAN appliance, fail-closed on bad input<\u002Fdiv>\n      <p>This is a <strong>LAN appliance<\u002Fstrong>, not an internet-facing service. Every data endpoint is gated by auth and every write is validated server-side, but it deliberately stops short of protections the hardware can't support (on-device TLS). The web-layer checks live in <code class=\"inl\">api.cpp<\u002Fcode> / <code class=\"inl\">validate.cpp<\u002Fcode> and run on every request.<\u002Fp>\n      <div class=\"fgrid\">\n        <div class=\"fcard\"><div class=\"ic\">▣<\u002Fdiv><h4>Basic Auth, random password<\u002Fh4><p>Every <code class=\"inl\">/api/*<\u002Fcode> endpoint sits behind HTTP Basic Auth with a <strong>random per-device password<\u002Fstrong> generated on first boot — no shared default. Only the static shell is public.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">≡<\u002Fdiv><h4>Constant-time compare<\u002Fh4><p>Credentials are checked byte-for-byte in constant time, so response timing can't leak how much of the password matched.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">◇<\u002Fdiv><h4>CSRF / Origin guard<\u002Fh4><p>A cross-origin POST carrying a mismatched <code class=\"inl\">Origin<\u002Fcode> / <code class=\"inl\">Host<\u002Fcode> is rejected with <code class=\"inl\">403<\u002Fcode> before it touches state.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">▱<\u002Fdiv><h4>Request body cap<\u002Fh4><p>Bodies are capped at <strong>8&nbsp;KB<\u002Fstrong> and over-cap reads truncate, so a flood can't exhaust RAM on a constrained device.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">↵<\u002Fdiv><h4>Header-injection guard<\u002Fh4><p>The webhook custom header rejects <span class=\"mono\">CR&nbsp;/&nbsp;LF<\u002Fspan>, so a crafted value can't smuggle extra HTTP headers downstream.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">✓<\u002Fdiv><h4>Server-side validation<\u002Fh4><p>Every POST + CSV row is validated in <code class=\"inl\">validate.cpp<\u002Fcode> (IPv4/RFC-1123, interval whitelist, CSV-injection rejected); invalid input returns <code class=\"inl\">400<\u002Fcode> and never mutates the store.<\u002Fp><\u002Fdiv>\n        <div class=\"fcard\"><div class=\"ic\">⊟<\u002Fdiv><h4>TLS heap / crash guard<\u002Fh4><p>Before any outbound TLS session the gate checks free internal RAM (≥20&nbsp;KB contiguous &amp; ≥48&nbsp;KB total). Under that floor the session is skipped as <code class=\"inl\">low mem<\u002Fcode> rather than risking an <strong>out-of-memory fault<\u002Fstrong>.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"note warn\"><span class=\"ic\">!<\u002Fspan><div><b>Known residuals — by design / hardware.<\u002Fb> The dashboard is <b>cleartext HTTP<\u002Fb>, so the Basic-Auth password and all API traffic cross the network unencrypted (front it with TLS or keep it on a trusted VLAN). <b>Outbound webhooks use unverified TLS<\u002Fb> — HTTPS webhooks are encrypted but the server cert isn't checked. <b>Secrets are stored in plaintext NVS<\u002Fb> (no flash encryption by default). The auto-password is <b>visible on the LCD<\u002Fb> until you change it, there's <b>no auth rate-limiting<\u002Fb>, and <b>no Secure Boot<\u002Fb> by default.<\u002Fdiv><\u002Fdiv>\n      <div class=\"note teal\"><span class=\"ic\">!<\u002Fspan><div><b>Recommended deployment.<\u002Fb> Keep the appliance on a trusted or isolated <b>IoT VLAN<\u002Fb>, firewalled off the internet; <b>set your own web password immediately<\u002Fb>; put a <b>TLS reverse proxy<\u002Fb> in front if you need encryption / remote access; and point notifications at <b>trusted endpoints<\u002Fb> the device reaches over your own network. For higher assurance, enable ESP-IDF flash encryption + Secure Boot v2 (one-way fuses — test on a spare board first).<\u002Fdiv><\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- HOSTS CSV -->\n    <section id=\"hosts\">\n      <h2><span class=\"num\">06<\u002Fspan>hosts.csv format<\u002Fh2>\n      <div class=\"htitle\">Defining your fleet<\u002Fdiv>\n      <p>A header row is required, then one host per line. Every row is validated on load — malformed rows are skipped and logged over serial. Edits made in the dashboard are written back to this file in flash. New hosts default to <strong>ping only<\u002Fstrong> (enable other checks per host in the dashboard).<\u002Fp>\n      <div class=\"code\"><div class=\"bar\"><span class=\"fn\">/hosts.csv  ·  on-board flash (LittleFS)<\u002Fspan><button class=\"copy\">Copy<\u002Fbutton><\u002Fdiv><pre><span class=\"c\">name,address,group,checks,intervals,alerts<\u002Fspan>\nnas-01,192.168.1.10,Storage,<span class=\"s\">ping|dns|port|http<\u002Fspan>,,down|recovered\npihole,192.168.1.12,Network,<span class=\"s\">ping|dns|port|http<\u002Fspan>,<span class=\"v\">http:30<\u002Fspan>,down|warn|recovered\nhome-asst,192.168.1.20,Apps,<span class=\"s\">ping|dns|port|https<\u002Fspan>,<span class=\"v\">ping:10|port:10<\u002Fspan>,down|warn|recovered\nexample-blog,example.com,External,<span class=\"s\">ping|dns|port|https|ssl|trace<\u002Fspan>,<span class=\"v\">ping:60<\u002Fspan>,down|warn|recovered<\u002Fpre><\u002Fdiv>\n      <div class=\"tbl\"><table>\n        <thead><tr><th>Field<\u002Fth><th>Meaning<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td>name<\u002Ftd><td>Display name for the host.<\u002Ftd><\u002Ftr>\n          <tr><td>address<\u002Ftd><td>IP address or hostname to monitor.<\u002Ftd><\u002Ftr>\n          <tr><td>group<\u002Ftd><td>Free-text group used to organise the fleet.<\u002Ftd><\u002Ftr>\n          <tr><td>checks<\u002Ftd><td>Pipe list of enabled checks: <span class=\"mono\">ping | dns | port | http | https | ssl | trace<\u002Fspan>. <code class=\"inl\">http<\u002Fcode> = HTTP check over plaintext; <code class=\"inl\">https<\u002Fcode> = over TLS, <strong>always insecure<\u002Fstrong> (accepts any cert); <code class=\"inl\">ssl<\u002Fcode> = cert-expiry check (insecure handshake, reads <span class=\"mono\">notAfter<\u002Fspan>).<\u002Ftd><\u002Ftr>\n          <tr><td>intervals<\u002Ftd><td>Optional <span class=\"mono\">key:seconds<\u002Fspan> overrides, e.g. <span class=\"mono\">ping:10|http:30<\u002Fspan>. Seconds must be one of 10, 30, 60, 120, 300, 900, 3600, 21600, 43200, 86400.<\u002Ftd><\u002Ftr>\n          <tr><td>alerts<\u002Ftd><td>Optional pipe list from <span class=\"mono\">down | warn | recovered<\u002Fspan> (default <span class=\"mono\">down|recovered<\u002Fspan>).<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable><\u002Fdiv>\n      <div class=\"note\"><span class=\"ic\">i<\u002Fspan><div>Legacy tokens from older files are accepted on load and normalised: <code class=\"inl\">httpsv<\u002Fcode> → <code class=\"inl\">https<\u002Fcode> and <code class=\"inl\">sslv<\u002Fcode> → <code class=\"inl\">ssl<\u002Fcode> (verified TLS modes aren't supported). On the next save the file is rewritten with the current keys.<\u002Fdiv><\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- CHECKS -->\n    <section id=\"checks\">\n      <h2><span class=\"num\">07<\u002Fspan>The six checks<\u002Fh2>\n      <div class=\"htitle\">What each check does<\u002Fdiv>\n      <p>Each host enables any subset of these. Every check runs on its own interval and reports its own state — the host's overall status is the worst of its active checks. The engine runs on a statically-allocated task pinned to core 0, away from the LVGL display loop on core 1.<\u002Fp>\n      <div class=\"ckgrid\">\n        <div class=\"ckcard\"><div class=\"r1\"><span class=\"abbr\">PING<\u002Fspan><h4>Ping<\u002Fh4><span class=\"iv\">def 30s<\u002Fspan><\u002Fdiv><p>ICMP reachability plus packet-loss % via esp_ping.<\u002Fp><\u002Fdiv>\n        <div class=\"ckcard\"><div class=\"r1\"><span class=\"abbr\">DNS<\u002Fspan><h4>DNS<\u002Fh4><span class=\"iv\">def 5m<\u002Fspan><\u002Fdiv><p>Resolves the hostname and times the lookup.<\u002Fp><\u002Fdiv>\n        <div class=\"ckcard\"><div class=\"r1\"><span class=\"abbr\">PORT<\u002Fspan><h4>Port<\u002Fh4><span class=\"iv\">def 60s<\u002Fspan><\u002Fdiv><p>TCP connect to a port (per host; default 80), bounded by <code class=\"inl\">CONNECT_TIMEOUT_MS<\u002Fcode>.<\u002Fp><\u002Fdiv>\n        <div class=\"ckcard\"><div class=\"r1\"><span class=\"abbr\">HTTP<\u002Fspan><h4>HTTP<\u002Fh4><span class=\"iv\">def 60s<\u002Fspan><\u002Fdiv><p>GETs the host and expects a 2xx / 3xx. Per-host <span class=\"mono\">http<\u002Fspan> / <span class=\"mono\">https<\u002Fspan> scheme — HTTPS is always <strong>insecure<\u002Fstrong> (accepts any cert; reports reachability + status, not cert trust) and works on non-standard ports.<\u002Fp><\u002Fdiv>\n        <div class=\"ckcard\"><div class=\"r1\"><span class=\"abbr\">SSL<\u002Fspan><h4>SSL<\u002Fh4><span class=\"iv\">def 12h<\u002Fspan><\u002Fdiv><p>Insecure TLS handshake that reads the peer cert's <span class=\"mono\">notAfter<\u002Fspan> and reports days-to-expiry — <strong>warns<\u002Fstrong> under <code class=\"inl\">SSL_WARN_DAYS<\u002Fcode> (14), goes <strong>down<\u002Fstrong> once expired. Port per host (default 443). <strong>Use the hostname, not an IP<\u002Fstrong> — the cert is selected by SNI.<\u002Fp><\u002Fdiv>\n        <div class=\"ckcard\"><div class=\"r1\"><span class=\"abbr\">TRACE<\u002Fspan><h4>Trace<\u002Fh4><span class=\"iv\">def 5m<\u002Fspan><\u002Fdiv><p>Reachability plus a hop-count estimate from the reply TTL.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"note\"><span class=\"ic\">i<\u002Fspan><div>The <b>SSL cert-expiry check<\u002Fb> was removed in 1.4.3 and <b>restored (insecure) in 1.4.8<\u002Fb>, once <code class=\"inl\">MAX_HOSTS<\u002Fcode> was reduced enough to free the internal RAM for a single mbedTLS session (see <a href=\"#transport\">Transport<\u002Fa>). It reads the certificate's expiry date only — it does <b>not<\u002Fb> validate the chain. Because only one outbound TLS session fits, the <code class=\"inl\">tls_gate<\u002Fcode> serialises the SSL check, HTTPS host checks, and webhook deliveries — and a <a href=\"#transport\">heap guard<\u002Fa> defers any of them (as <code class=\"inl\">low mem<\u002Fcode>) if free internal RAM is below the TLS floor, rather than risking an OOM crash.<\u002Fdiv><\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- API -->\n    <section id=\"api\">\n      <h2><span class=\"num\">08<\u002Fspan>Web / JSON API<\u002Fh2>\n      <div class=\"htitle\">REST endpoints<\u002Fdiv>\n      <p>Everything is served over <strong>plain HTTP<\u002Fstrong> behind Basic Auth. Cross-origin POSTs are blocked, and every POST body is validated server-side; invalid input returns <code class=\"inl\">400 {ok:false, error:\"…\"}<\u002Fcode>.<\u002Fp>\n      <h3>Read<\u002Fh3>\n      <div class=\"tbl\"><table>\n        <thead><tr><th style=\"width:74px\">Method<\u002Fth><th>Endpoint<\u002Fth><th>Returns<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><span class=\"method get\">GET<\u002Fspan><\u002Ftd><td class=\"mono\">/api/summary<\u002Ftd><td>Fleet counts + device / net + clock<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method get\">GET<\u002Fspan><\u002Ftd><td class=\"mono\">/api/hosts<\u002Ftd><td>All hosts<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method get\">GET<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host?id=h1<\u002Ftd><td>One host<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method get\">GET<\u002Fspan><\u002Ftd><td class=\"mono\">/api/alerts<\u002Ftd><td>Recent alerts<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method get\">GET<\u002Fspan><\u002Ftd><td class=\"mono\">/api/settings<\u002Ftd><td>Webhook / defaults / device<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method get\">GET<\u002Fspan><\u002Ftd><td class=\"mono\">/api/status<\u002Ftd><td><span class=\"mono\">{ap, online, ip, ssid}<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method get\">GET<\u002Fspan><\u002Ftd><td class=\"mono\">/api/wifi/scan<\u002Ftd><td>Nearby networks<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable><\u002Fdiv>\n      <h3>Host governance &amp; editing<\u002Fh3>\n      <div class=\"tbl\"><table>\n        <thead><tr><th style=\"width:74px\">Method<\u002Fth><th>Endpoint<\u002Fth><th>Body<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host/ack<\u002Ftd><td><span class=\"mono\">{id, reason, who?}<\u002Fspan> — reason required<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host/pause<\u002Ftd><td><span class=\"mono\">{id, reason, until?, who?}<\u002Fspan> — reason required<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host/resume<\u002Ftd><td><span class=\"mono\">{id}<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host/clear<\u002Ftd><td><span class=\"mono\">{id}<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host/interval<\u002Ftd><td><span class=\"mono\">{id, key, every}<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host<\u002Ftd><td><span class=\"mono\">{id?, name, addr, group, checks[{key,enabled,every,port,secure}], alerts{}}<\u002Fspan> — writes CSV<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/host/delete<\u002Ftd><td><span class=\"mono\">{id}<\u002Fspan><\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable><\u002Fdiv>\n      <h3>Settings &amp; system<\u002Fh3>\n      <div class=\"tbl\"><table>\n        <thead><tr><th style=\"width:74px\">Method<\u002Fth><th>Endpoint<\u002Fth><th>Body<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/settings/webhook<\u002Ftd><td><span class=\"mono\">{url, method, header, enabled, when[]}<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/settings/defaults<\u002Ftd><td><span class=\"mono\">{interval[6], fails, lcdHome, renotify, renotifyEvery}<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/settings/auth<\u002Ftd><td><span class=\"mono\">{user, pass}<\u002Fspan> — pass 8–39 chars<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/test/webhook<\u002Ftd><td><span class=\"mono\">{}<\u002Fspan><\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/sd/reload<\u002Ftd><td><span class=\"mono\">{}<\u002Fspan> — reloads hosts.csv from flash<\u002Ftd><\u002Ftr>\n          <tr><td><span class=\"method post\">POST<\u002Fspan><\u002Ftd><td class=\"mono\">/api/wifi/join<\u002Ftd><td><span class=\"mono\">{ssid, pass}<\u002Fspan> — saves + reboots<\u002Ftd><\u002Ftr>\n        <\u002Ftbody>\n      <\u002Ftable><\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- SOURCE -->\n    <section id=\"source\">\n      <h2><span class=\"num\">09<\u002Fspan>Source layout<\u002Fh2>\n      <div class=\"htitle\">Flat sketch — Arduino compiles every .ino/.cpp/.h<\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"tree\">\n<span class=\"f\">HostMonitor.ino<\u002Fspan>     <span class=\"cm\">entry point: setup()/loop(), boot order (load hosts → web → display)<\u002Fspan>\n<span class=\"f\">config.h<\u002Fspan>            <span class=\"cm\">tunables, intervals, web/auth/wifi defaults<\u002Fspan>\n<span class=\"f\">model.h/.cpp<\u002Fspan>        <span class=\"cm\">Host / Check types + metadata (six check kinds)<\u002Fspan>\n<span class=\"f\">store.h/.cpp<\u002Fspan>        <span class=\"cm\">in-memory host store + governance (mutex-guarded)<\u002Fspan>\n<span class=\"f\">validate.h/.cpp<\u002Fspan>     <span class=\"cm\">input validation (CSV + API)<\u002Fspan>\n<span class=\"f\">csv.h/.cpp<\u002Fspan>          <span class=\"cm\">LittleFS hosts.csv read/write (validated) + storage diag<\u002Fspan>\n<span class=\"f\">settings.h/.cpp<\u002Fspan>     <span class=\"cm\">NVS config + first-boot password gen + NTP/runtime time<\u002Fspan>\n<span class=\"f\">rtc.h/.cpp<\u002Fspan>          <span class=\"cm\">PCF85063 driver — DISABLED in this build (single-I2C-driver)<\u002Fspan>\n<span class=\"f\">checks.h/.cpp<\u002Fspan>       <span class=\"cm\">the six checks (ping/dns/port/http/ssl/trace) + cert probe + TLS self-test<\u002Fspan>\n<span class=\"f\">scheduler.h/.cpp<\u002Fspan>    <span class=\"cm\">interval engine + status / alert transitions + load metrics<\u002Fspan>\n<span class=\"f\">notifier.h/.cpp<\u002Fspan>     <span class=\"cm\">webhook delivery + routing (outbound TLS unverified; email removed)<\u002Fspan>\n<span class=\"f\">tls_gate.h/.cpp<\u002Fspan>     <span class=\"cm\">single outbound-TLS-session mutex + pre-session heap/crash guard<\u002Fspan>\n<span class=\"f\">wifi_portal.h/.cpp<\u002Fspan>  <span class=\"cm\">STA join + 'HostMon' AP (non-captive) + mDNS<\u002Fspan>\n<span class=\"f\">web_assets.h<\u002Fspan>        <span class=\"cm\">data/ dashboard, gzipped + embedded in firmware<\u002Fspan>\n<span class=\"f\">webserver.h/.cpp<\u002Fspan>    <span class=\"cm\">plain-HTTP dashboard/API server (task-pumped)<\u002Fspan>\n<span class=\"f\">api.h/.cpp<\u002Fspan>          <span class=\"cm\">JSON REST + embedded gzip dashboard (Basic Auth + CSRF)<\u002Fspan>\n<span class=\"f\">display.h/.cpp<\u002Fspan>      <span class=\"cm\">CH422G → RGB → GT911 → LVGL bring-up (PSRAM)<\u002Fspan>\n<span class=\"f\">theme.h/.cpp<\u002Fspan>        <span class=\"cm\">LVGL design tokens + widget factories<\u002Fspan>\n<span class=\"f\">ui.h/.cpp<\u002Fspan>           <span class=\"cm\">LCD root + 3-tab nav (Home / Hosts / Alerts·Setup) + refresh<\u002Fspan>\n<span class=\"f\">screen_health.cpp<\u002Fspan>   <span class=\"cm\">LCD Home (donut + needs-attention)<\u002Fspan>\n<span class=\"f\">screen_grid.cpp<\u002Fspan>     <span class=\"cm\">LCD Hosts (scrollable host tiles)<\u002Fspan>\n<span class=\"f\">lv_conf.h<\u002Fspan>           <span class=\"cm\">LVGL v8 config (copy to libraries/)<\u002Fspan>\n<span class=\"f\">partitions.csv<\u002Fspan>      <span class=\"cm\">custom 8 MB layout (5 MB app / ~2.9 MB LittleFS)<\u002Fspan>\n<span class=\"f\">data/<\u002Fspan>               <span class=\"cm\">dashboard source (gzipped into web_assets.h)<\u002Fspan>\n<span class=\"f\">sd/hosts.csv<\u002Fspan>        <span class=\"cm\">sample host list (optional LittleFS seed)<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"divider\"><\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- LIMITATIONS -->\n    <section id=\"limits\">\n      <h2><span class=\"num\">10<\u002Fspan>Limitations<\u002Fh2>\n      <div class=\"htitle\">Known limitations &amp; dropped features<\u002Fdiv>\n      <p>Capabilities that were attempted and then removed (or never shipped) because of hardware or platform constraints on this board. Recorded here so the gaps — and <strong>why<\u002Fstrong> they exist — are explicit.<\u002Fp>\n      <div class=\"note teal\"><span class=\"ic\">!<\u002Fspan><div>Almost everything below traces to one of two roots: <b>not enough free internal RAM for on-device TLS<\u002Fb>, and the panel stack's <b>single-I²C-driver<\u002Fb> requirement (which forces a <code class=\"inl\">Wire<\u002Fcode>-free build).<\u002Fdiv><\u002Fdiv>\n\n      <h3>On-device TLS — one insecure session, no verification<\u002Fh3>\n      <p>An mbedTLS session needs ~16–44&nbsp;KB of <em>contiguous internal<\u002Fem> RAM. After <code class=\"inl\">MAX_HOSTS<\u002Fcode> was reduced (and the old cert / HTTPS-server cruft removed) to reclaim RAM, the board now runs <strong>one insecure session at a time<\u002Fstrong> — confirmed by a boot self-test reporting ~23&nbsp;KB still free at the session's peak. That re-enabled the cert-expiry check plus insecure HTTPS checks / webhooks, serialised by the <a href=\"#transport\">TLS gate<\u002Fa> — which also enforces a <strong>pre-session heap floor<\u002Fstrong> (≥20&nbsp;KB contiguous &amp; ≥48&nbsp;KB total free internal), skipping a session as <code class=\"inl\">low mem<\u002Fcode> if RAM is too tight rather than faulting. What still doesn't fit is <strong>multiple concurrent<\u002Fstrong> sessions or <strong>verified<\u002Fstrong> TLS (CA-bundle chain validation).<\u002Fp>\n      <ul class=\"clean\">\n        <li><strong>HTTPS for the dashboard<\u002Fstrong> — removed; a page load opens several concurrent TLS sessions, which don't fit. TLS server, cert provisioning and embedded cert/key all deleted; the dashboard is plain HTTP only.<\u002Fli>\n        <li><strong>Self-signed cert + trust-on-first-use<\u002Fstrong> — wired up as a lighter alternative, then abandoned; handshakes reset regardless of cert type (tested RSA and ECDSA).<\u002Fli>\n        <li><strong>SSL/TLS certificate-expiry check<\u002Fstrong> — removed in 1.4.3, <strong>restored (insecure) in 1.4.8<\u002Fstrong> once the self-test confirmed a single session fits. Reads the cert <span class=\"mono\">notAfter<\u002Fspan>; does not validate the chain.<\u002Fli>\n        <li><strong>HTTPS host-check “verify” option<\u002Fstrong> — removed; HTTPS host checks are insecure-only (reachability + status, not cert trust).<\u002Fli>\n        <li><strong>Email / SMTP alerting (ESP Mail Client)<\u002Fstrong> — <strong>removed in 1.4.9<\u002Fstrong>. It was the heaviest TLS user; dropping it raises the worst-case internal-RAM floor. Webhook is the only delivery channel now — route it to a relay if you need email.<\u002Fli>\n        <li><strong>Notifier outbound TLS verification<\u002Fstrong> — removed; HTTPS webhooks are encrypted but the server identity is not checked.<\u002Fli>\n        <li><strong>Verified HTTPS via <code class=\"inl\">setCACertBundle()<\u002Fcode><\u002Fstrong> — abandoned earlier: the core CA bundle couldn't be referenced by symbol on this core (<code class=\"inl\">undefined reference _binary_…_crt_bundle_bin<\u002Fcode>).<\u002Fli>\n      <\u002Ful>\n\n      <h3>Hardware / driver conflicts<\u002Fh3>\n      <ul class=\"clean\">\n        <li><strong>On-board PCF85063 RTC<\u002Fstrong> — disabled. The build stays <code class=\"inl\">Wire<\u002Fcode>-free to avoid the legacy/<code class=\"inl\">driver_ng<\u002Fcode> I²C clash, so there's no wall clock across a power-cycle until NTP re-syncs.<\u002Fli>\n        <li><strong>SD-card storage<\u002Fstrong> — dropped. SD chip-select falls back to GPIO10, an active RGB data line (DATA4); mounting SD while the panel runs corrupts the parallel bus. Persistence uses LittleFS instead.<\u002Fli>\n        <li><strong>Captive-portal auto-redirect<\u002Fstrong> — dropped. The bundled DNSServer calls <code class=\"inl\">udp_new()<\u002Fcode> without the lwIP core lock and asserts under core-locking. The AP still works — browse to its IP manually.<\u002Fli>\n        <li><strong>Reliable runtime USB-serial logging<\u002Fstrong> — given up as the primary diagnostic channel; serial is unreliable once RGB + Wi-Fi are both live, so diagnostics surface on the LCD Alerts·Setup card.<\u002Fli>\n      <\u002Ful>\n\n      <h3>Tried &amp; reverted (memory pressure)<\u002Fh3>\n      <ul class=\"clean\">\n        <li><strong>Internal-RAM LVGL draw buffers<\u002Fstrong> — attempted to fix the green RGB flicker, but consumed enough internal heap that the check task failed to create. Reverted to PSRAM draw buffers; the flicker was fixed instead with conditional <code class=\"inl\">markDirty<\u002Fcode>.<\u002Fli>\n      <\u002Ful>\n\n      <h3>Accepted platform pins<\u002Fh3>\n      <ul class=\"clean\">\n        <li><strong>LVGL stays on v8.4<\u002Fstrong> — v9 won't compile against this code.<\u002Fli>\n        <li><strong>A custom <code class=\"inl\">partitions.csv<\u002Fcode> is mandatory<\u002Fstrong> — the app won't fit a default partition scheme.<\u002Fli>\n        <li><strong>The build must stay <code class=\"inl\">Wire<\u002Fcode>-free<\u002Fstrong> — see the RTC note above.<\u002Fli>\n      <\u002Ful>\n    <\u002Fsection>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<footer>Host Monitor v1.4.18 · Waveshare ESP32-S3-Touch-LCD-4.3 · Arduino IDE project<\u002Ffooter>\n\n<script>\n// ---- copy buttons ----\ndocument.querySelectorAll('.code').forEach(function(box){\n  var btn=box.querySelector('.copy'); if(!btn)return;\n  btn.addEventListener('click',function(){\n    var txt=box.querySelector('pre').innerText;\n    navigator.clipboard.writeText(txt).then(function(){\n      var old=btn.textContent;btn.textContent='Copied ✓';btn.classList.add('ok');\n      setTimeout(function(){btn.textContent=old;btn.classList.remove('ok')},1400);\n    });\n  });\n});\n\n// ---- scroll-spy ----\nvar links=[].slice.call(document.querySelectorAll('nav.toc a'));\nvar map={};links.forEach(function(a){map[a.getAttribute('href').slice(1)]=a});\nvar spy=new IntersectionObserver(function(entries){\n  entries.forEach(function(e){\n    if(e.isIntersecting){\n      links.forEach(function(a){a.classList.remove('on')});\n      var on=map[e.target.id]; if(on)on.classList.add('on');\n    }\n  });\n},{rootMargin:'-44% 0px -50% 0px',threshold:0});\ndocument.querySelectorAll('main section[id]').forEach(function(s){spy.observe(s)});\n\n// ---- mobile menu ----\nvar toc=document.getElementById('toc'),mb=document.getElementById('menuBtn');\nmb.addEventListener('click',function(){toc.classList.toggle('open')});\ntoc.addEventListener('click',function(e){if(e.target.tagName==='A')toc.classList.remove('open')});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
